# DataSource configuration for H2 in-memory database
spring.datasource.url=jdbc:h2:mem:restaurant_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configurations for testing
jwt.secret=test-secret-key-that-is-at-least-32-characters-long-and-secure-for-testing
jwt.expiration-ms=3600000

# Seed Passwords (required by DataSeeder)
ADMIN_PASSWORD=admin
ATTENDANT_PASSWORD=attendant
CUSTOMER_PASSWORD=customer
