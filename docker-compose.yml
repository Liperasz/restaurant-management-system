services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  api:
    build: ./backend
    ports:
      - "${API_PORT}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./backend/.env

  web:
    build: ./frontend
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - api

volumes:
  mysql_data:
